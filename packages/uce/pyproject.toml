[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uce"
version = "0.1.0"
description = "Unified Concept Editing (UCE) for Stable Diffusion - closed-form concept erasing"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "UCE Team"}
]
keywords = ["diffusion", "stable-diffusion", "concept-editing", "unlearning", "safety"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]

dependencies = [
    "torch>=2.0.0",
    "diffusers>=0.21.0",
    "transformers>=4.30.0",
    "safetensors>=0.3.0",
    "Pillow>=9.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
]

[project.urls]
Homepage = "https://github.com/rohitgandikota/unified-concept-editing"
Repository = "https://github.com/your-org/uce"
Documentation = "https://github.com/your-org/uce#readme"

[tool.setuptools]
packages = ["uce"]
package-data = {"uce" = ["weights/*.safetensors", "training/*.py"]}

[tool.setuptools.package-dir]
"" = "src"
