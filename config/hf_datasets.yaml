# HuggingFace dataset paths and column configs.
# Fill in repo_id values before running. HF_TOKEN should be set in your .env file.

datasets:

  coco:
    repo_id: "phiyodr/coco2017"       # placeholder — replace with your repo
    split: "validation"
    image_col: "image"
    caption_col: "captions"

  i2p:
    repo_id: "AIML-TUDA/i2p"
    split: "train"
    caption_col: "prompt"

  tifa:
    repo_id: "your-org/tifa-benchmark"  # placeholder
    split: "train"
    caption_col: "caption"
    qa_col: "qas"

  err_challenge:
    repo_id: "your-org/err-challenge"   # placeholder
    split: "train"
    caption_col: "direct_prompt"
    concept_col: "concept_name"

  ring_a_bell:
    repo_id: "your-org/ring-a-bell"     # placeholder
    split: "train"
    caption_col: "prompt"
    concept_col: "concept"
